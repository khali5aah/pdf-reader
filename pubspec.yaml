name: futuristic_pdf_reader
description: A cyberpunk-inspired futuristic PDF reader with advanced navigation, powerful search, and animated visuals.
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  provider: ^6.0.5
  hive_flutter: ^1.1.0
  permission_handler: ^12.0.1
  file_picker: ^11.0.2
  path_provider: ^2.0.18
  syncfusion_flutter_pdfviewer: ^33.2.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
